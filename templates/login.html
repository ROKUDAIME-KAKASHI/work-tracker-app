{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center p-4" style="min-height: 100vh; width: 100vw;">
  <div class="glass-card max-w-md w-full animate-fade-in">
    <div class="text-center mb-6">
      <h2 class="text-2xl" style="font-weight: 600; font-size: 1.5rem; margin: 0 0 4px 0;">Welcome back</h2>
      <p class="text-secondary" style="margin: 0; font-size: 0.95rem;">Enter your details to access your tracker.</p>
    </div>

    <!-- We will use a query param or toggle to switch between login and register -->
    <form method="POST" class="flex flex-col gap-4">
      <!-- Hidden input to determine action -->
      <input type="hidden" name="action" id="form-action" value="login">
      
      <div>
        <label class="label">Email</label>
        <input type="email" name="email" class="input-field" placeholder="you@example.com" required>
      </div>
      
      <div>
        <label class="label">Password</label>
        <input type="password" name="password" class="input-field" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary mt-4" id="submit-btn">
        Sign in
      </button>
    </form>

    <div class="text-center mt-6">
      <button 
        onclick="toggleMode()" 
        style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem;"
        id="toggle-btn"
      >
        Don't have an account? Sign up
      </button>
    </div>
  </div>
</div>

<script>
  let isLogin = true;
  function toggleMode() {
      isLogin = !isLogin;
      document.getElementById('form-action').value = isLogin ? 'login' : 'register';
      document.getElementById('submit-btn').innerText = isLogin ? 'Sign in' : 'Create account';
      document.getElementById('toggle-btn').innerText = isLogin ? "Already have an account? Sign in" : "Don't have an account? Sign up";
  }
</script>
{% endblock %}
